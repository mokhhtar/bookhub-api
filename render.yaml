services:
  - type: web
    name: bookhub-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # set manually in Render dashboard — never commit secrets
      - key: GOOGLE_BOOKS_API_KEY
        sync: false        # optional — works without one at low volume, raises rate limits if set
      - key: AMAZON_TAG
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AMAZON_CREDENTIAL_ID
        sync: false
      - key: AMAZON_CREDENTIAL_SECRET
        sync: false
      - key: AMAZON_PARTNER_TAG
        sync: false
    healthCheckPath: /health
